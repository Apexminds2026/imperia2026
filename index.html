        // CORRECTED AUDIO ROUTING FOR GITHUB ENVIRONMENT
        function togglePlatformAudio() {
            // Target the video tag directly by its unique id
            const player = document.getElementById('cinematicPlayer');
            const btn = document.getElementById('audioStatusBtn');
            
            if (player) {
                if (player.muted) {
                    player.muted = false;
                    btn.innerHTML = "<span>🔈 Mute Sound</span>";
                    btn.style.background = "#334155";
                    btn.style.borderColor = "#475569";
                } else {
                    player.muted = true;
                    btn.innerHTML = "<span>🔊 Tap to Turn On Sound</span>";
                    btn.style.background = "rgba(180, 83, 9, 0.85)";
                    btn.style.borderColor = "#f59e0b";
                }
            }
        }

        function openPreview(docKey) {
            const data = previewData[docKey];
            document.getElementById('modalTitle').innerText = data.title;
            document.getElementById('previewText').innerHTML = data.msg;
            document.getElementById('modalWaBtn').href = "https://wa.me/918369971596?text=" + encodeURIComponent(data.waText);
            document.getElementById('previewModal').style.display = 'flex';
        }
        
        function closePreview() {
            document.getElementById('previewModal').style.display = 'none';
        }

        function requestSiteVisit() {
            const day = document.getElementById('visitDay').value;
            const time = document.getElementById('visitTime').value;
            const message = `Hello, I would like to schedule a private guided site tour for The Sephyra. Preferred timeline: ${day} around ${time}. Please confirm availability.`;
            window.open("https://wa.me/918369971596?text=" + encodeURIComponent(message), '_blank');
        }
